; PlatformIO Project Configuration File
;
; フリック入力 物理インターフェース (ATOM S3)
; ハードウェア:
;   - M5Stack ATOM S3 (ESP32-S3)
;   - MPR121 #1 (I2C Addr=0x5A) → 4パッド (電極0-3: あ/か/さ/た行)
;   - MPR121 #2 (I2C Addr=0x5B) → 5パッド (電極0-4: な/は/ま/や/ら行)
;   - MCP23017 (I2C Addr=0x20) → 16bit GPIO エクスパンダで物理方向ボタン 4本
;       GPA0=↑  GPA1=←  GPA2=↓  GPA3=→  (各ピン active-LOW / 内部プルアップ)
;   - USB HID キーボード → PC の日本語 IME にローマ字送信
;
; 配線メモ (I2C バス共通: SDA=G2 / SCL=G1 / 3V3 / GND):
;   MPR121 #1 ADDR → GND        (0x5A)
;   MPR121 #2 ADDR → VCC (3V3)  (0x5B)
;   MCP23017 A0,A1,A2 → GND     (0x20)
;   方向スイッチ → MCP23017 GPA0-GPA3 (反対端 GND) — 内部プルアップ使用
;
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-atoms3]
platform = espressif32
board = m5stack-atoms3
framework = arduino

; ESP32-S3 ネイティブ USB を TinyUSB (HID) モードで動かす
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    ; M5Unified: ATOM S3 の LCD 表示に使用 (IMU は不使用)
    m5stack/M5Unified @ ^0.2.2
    ; MPR121: 12ch 静電容量タッチ IC ドライバ (×2 台使用)
    adafruit/Adafruit MPR121 @ ^1.1.2
    ; MCP23017: 16bit I2C GPIO エクスパンダ (方向ボタン用)
    adafruit/Adafruit MCP23017 Arduino Library @ ^2.3.2
    adafruit/Adafruit BusIO @ ^1.16.2

monitor_speed = 115200

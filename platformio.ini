; PlatformIO Project Configuration File
;
; フリック入力 物理インターフェース (ATOM S3)
; ハードウェア:
;   - M5Stack ATOM S3 (ESP32-S3)
;   - MPR121 静電容量タッチコントローラ (I2C: SDA=G2, SCL=G1, Addr=0x5A)
;     └ 9 個のタッチパッド → 3×3 グリッド (あ/か/さ/た/な/は/ま/や/ら 行)
;   - MPU6886 内蔵 IMU → 加速度でフリック方向を検出
;   - USB HID キーボード → PC の日本語 IME にローマ字送信
;
; 配線メモ:
;   MPR121 VCC → 3V3
;   MPR121 GND → GND
;   MPR121 SDA → G2 (Grove)
;   MPR121 SCL → G1 (Grove)
;   MPR121 ADDR → GND (I2C address 0x5A)
;   パッド 0–8 → MPR121 電極 0–8
;
; https://docs.platformio.org/page/projectconf.html

[env:m5stack-atoms3]
platform = espressif32
board = m5stack-atoms3
framework = arduino

; ESP32-S3 ネイティブ USB を TinyUSB (HID) モードで動かす
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    ; M5Unified: ATOM S3 の LCD・IMU(MPU6886)を抽象化
    m5stack/M5Unified @ ^0.2.2
    ; MPR121: 12ch 静電容量タッチ IC ドライバ
    adafruit/Adafruit MPR121 @ ^1.1.2
    adafruit/Adafruit BusIO @ ^1.16.2

monitor_speed = 115200
